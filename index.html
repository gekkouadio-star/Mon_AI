<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakGérard - IA Portfolio</title>
 
    <script src="https://cdn.tailwindcss.com"></script>
 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
 
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
 
    <style>
        /* Styles personnalisés pour compléter Tailwind */
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
 
        /* Zone de défilement des messages avec barre de scroll fine */
        .chat-container { height: 500px; scrollbar-width: thin; scrollbar-color: #334155 transparent; }
 
        /* Style des messages envoyés par l'utilisateur (bleu dégradé, aligné à droite) */
        .user-msg {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            align-self: flex-end;
            border-radius: 18px 18px 2px 18px;
        }
 
        /* Style des messages envoyés par le bot (sombre, aligné à gauche) */
        .bot-msg {
            background-color: #1e293b;
            align-self: flex-start;
            border: 1px solid #334155;
            border-radius: 18px 18px 18px 2px;
        }
 
        /* Effet de transparence "Glassmorphism" pour le conteneur principal */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
 
<body class="min-h-screen flex flex-col items-center justify-center p-4">
 
    <div class="w-full max-w-2xl text-center mb-8 mt-4">
        <div class="w-24 h-24 bg-blue-600 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold shadow-lg shadow-blue-500/20">
            GK
        </div>

        <h1 class="text-4xl font-extrabold text-white tracking-tight">
            Speak <span class="text-blue-500">Gérard</span>
        </h1>

        <p class="text-slate-400 mt-2">
            Data Engineer, Scientist & Analyste Risques
        </p>

        <div class="flex justify-center gap-6 mt-3 text-sm">

            <a href="mailto:gekkouadio@gmail.com"
               class="text-slate-300 hover:text-blue-400 transition flex items-center gap-2">
                <i class="fas fa-envelope"></i>
                Email
            </a>

            <a href="https://www.linkedin.com/in/gérard-kouadio-1er"
               target="_blank"
               class="text-slate-300 hover:text-blue-400 transition flex items-center gap-2">
                <i class="fab fa-linkedin"></i>
                LinkedIn
            </a>

            <a href="https://gekkouadio-star.github.io/Gerard.github.io/"
               target="_blank"
               class="text-slate-300 hover:text-blue-400 transition flex items-center gap-2">
                <i class="fas fa-globe"></i>
                Portfolio
            </a>

        </div>
    </div>
 
    <div class="w-full max-w-2xl glass rounded-2xl flex flex-col overflow-hidden shadow-2xl">
        
        <div class="bot-msg p-4 max-w-[100%] text-sm leading-relaxed shadow-sm">
                Bonjour ! Je suis le jumeau numérique de Gérard KOUADIO.
                Je connais son parcours, ses projets Data et ses compétences.
                Que voulez-vous savoir 🧠?
        </div>

        <div id="chat" class="chat-container p-6 flex flex-col gap-4 overflow-y-auto"></div>
 
        <div class="p-4 border-t border-slate-700 bg-slate-900/50 flex gap-2">
            <input id="userInput" type="text" placeholder="Posez une question..."
                   class="flex-1 bg-slate-800 border border-slate-700 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
 
            <button id="sendBtn"
                    class="bg-blue-600 hover:bg-blue-500 p-3 rounded-xl transition flex items-center justify-center w-12">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
 
<script>
    /* Configuration de Marked pour gérer les retours à la ligne et le formatage GitHub */
    marked.setOptions({ breaks: true, gfm: true });

    /* Gestion de la session utilisateur : on crée ou récupère un ID unique pour le chat */
    let sessionId = localStorage.getItem("Gérard_sid") || crypto.randomUUID();
    localStorage.setItem("Gérard_sid", sessionId);

    /* Récupération des éléments HTML pour manipulation JS */
    const chatDiv = document.getElementById("chat");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    /**
     * Ajoute un message dans l'interface
     * @param {string} sender - Nom de l'expéditeur (Vous / Gérard IA)
     * @param {string} text - Contenu du message
     * @param {string} className - Classe CSS pour le style (user-msg ou bot-msg)
     * @param {boolean} isBot - Si vrai, utilise le parser Markdown
     */
    function appendMessage(sender, text, className, isBot=false) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `p-4 max-w-[85%] text-sm leading-relaxed shadow-sm ${className}`;

        const header = `
            <span class="block text-xs opacity-50 mb-1 font-bold uppercase tracking-wider">
                ${sender}
            </span>
        `;

        // Si c'est le bot, on transforme le Markdown en HTML. Sinon, texte brut.
        msgDiv.innerHTML = isBot ? header + marked.parse(text) : header + text;

        chatDiv.appendChild(msgDiv);
        
        // Scroll automatique vers le bas pour voir le dernier message
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    /**
     * Gère l'envoi du message vers l'API Python (Render)
     */
    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return; // Ne rien faire si le champ est vide

        // 1. Afficher le message de l'utilisateur
        appendMessage("Vous", message, "user-msg text-white");
        userInput.value = ""; // Vider le champ

        try {
            // 2. Appel vers ton API FastAPI déployée sur Render
            const response = await fetch("https://mon-ai.onrender.com/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message, sessionId: sessionId })
            });

            const data = await response.json();
            
            // 3. Afficher la réponse de l'IA
            appendMessage("Gérard IA", data.reply, "bot-msg", true);

        } catch (e) {
            // Gestion des erreurs de connexion (ex: serveur éteint ou mauvaise URL)
            appendMessage("Erreur", "Vérifiez que le serveur Python tourne bien !", "bot-msg text-red-400");
        }
    }

    /* Écouteur de clic sur le bouton d'envoi */
    sendBtn.addEventListener("click", sendMessage);

    /* Écouteur de touche "Entrée" dans le champ de saisie */
    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });
</script>
 
</body>
</html>
